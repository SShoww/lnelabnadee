<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Urine EQA KPI Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .filter-section { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 30px; background: #eef2f7; padding: 15px; border-radius: 10px; }
        select { padding: 8px 12px; border-radius: 5px; border: 1px solid #3498db; font-family: 'Sarabun'; }
        .kpi-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { padding: 20px; border-radius: 10px; text-align: center; color: white; }
        .bg-info { background: #3498db; }
        .bg-success { background: #27ae60; }
        .val { font-size: 32px; font-weight: bold; }
        .label { font-size: 14px; opacity: 0.9; }
        .chart-wrap { height: 450px; position: relative; }
    </style>
</head>
<body>

<div class="container">
    <h2>สรุป KPI รายการทดสอบ Urine EQA</h2>
    
    <div class="filter-section">
        <label>ตั้งแต่:</label>
        <select id="startRound" onchange="updateDashboard()"></select>
        <label>ถึง:</label>
        <select id="endRound" onchange="updateDashboard()"></select>
    </div>

    <div class="kpi-cards">
        <div class="card bg-info">
            <div id="totalAvg" class="val">0.00</div>
            <div class="label">คะแนนเฉลี่ยรวมในช่วงที่เลือก</div>
        </div>
        <div class="card bg-success">
            <div id="passRate" class="val">0%</div>
            <div class="label">% จำนวนครั้งที่ผ่านเกณฑ์ (คะแนน &ge; 3 ต่อครั้ง)</div>
        </div>
    </div>

    <div class="chart-wrap">
        <canvas id="summaryChart"></canvas>
    </div>
</div>

<script>
    // URL สำหรับไฟล์ Urine EQA
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRQgjpfeAaUuEoVcfjZvvTzAZLRyADkILj-b3goZnq-W4Y3xRiqPV3WXNW8BTsimQgYzCTRvz-fApll/pub?gid=0&single=true&output=csv';
    let allData = [];
    let rounds = [];
    let chart;

    async function init() {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allData = results.data;
                // กรองหัวตารางที่มีคำว่า "ครั้งที่"
                rounds = results.meta.fields.filter(f => f.includes('ครั้งที่'));
                
                const s = document.getElementById('startRound');
                const e = document.getElementById('endRound');
                
                s.innerHTML = '';
                e.innerHTML = '';
                
                rounds.forEach((r, i) => {
                    s.add(new Option(r, i));
                    e.add(new Option(r, i));
                });
                
                e.value = rounds.length - 1;
                updateDashboard();
            }
        });
    }

    function updateDashboard() {
        const startIdx = parseInt(document.getElementById('startRound').value);
        const endIdx = parseInt(document.getElementById('endRound').value);
        
        if(startIdx > endIdx) return;

        const selectedRounds = rounds.slice(startIdx, endIdx + 1);
        // กรองแถวที่ไม่ใช่ "คะแนนเฉลี่ย" และมีชื่อการทดสอบ
        const testRows = allData.filter(d => d['การทดสอบ'] && d['การทดสอบ'].trim() !== 'คะแนนเฉลี่ย');

        const labels = [];
        const averages = [];
        let totalOccurrences = 0; 
        let passOccurrences = 0;  
        let sumAllScore = 0;

        testRows.forEach(row => {
            labels.push(row['การทดสอบ']);
            let itemSum = 0;
            let itemCount = 0;
            
            selectedRounds.forEach(r => {
                let v = parseFloat(row[r]);
                if(!isNaN(v)) {
                    totalOccurrences++; 
                    sumAllScore += v;
                    itemSum += v;
                    itemCount++;
                    
                    if(v >= 3) {
                        passOccurrences++; 
                    }
                }
            });

            const itemAvg = itemCount > 0 ? itemSum / itemCount : 0;
            averages.push(itemAvg.toFixed(2));
        });

        // คำนวณ KPI ภาพรวม
        const kpiPercent = totalOccurrences > 0 ? ((passOccurrences / totalOccurrences) * 100).toFixed(0) : 0;
        const totalAvg = totalOccurrences > 0 ? (sumAllScore / totalOccurrences).toFixed(2) : '0.00';

        document.getElementById('passRate').textContent = kpiPercent + '%';
        document.getElementById('totalAvg').textContent = totalAvg;

        renderChart(labels, averages);
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('summaryChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'คะแนนเฉลี่ยในช่วงที่เลือก',
                    data: data,
                    backgroundColor: data.map(v => v >= 3 ? '#2ecc71' : '#e74c3c'),
                    borderRadius: 5
                }]
            },
            options: {
                indexAxis: 'y', // เปลี่ยนเป็นแนวนอนเพื่อให้ชื่อรายการที่ยาวอ่านง่ายขึ้น
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { beginAtZero: true, max: 4, title: { display: true, text: 'คะแนน' } }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    }

    init();
</script>
</body>
</html>
