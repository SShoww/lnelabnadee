<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart EQA Analysis - Sigma Opspecs</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; margin: 20px; background-color: #f4f7f9; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .controls { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; align-items: center; gap: 20px; justify-content: center; }
        select { padding: 10px 20px; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; min-width: 250px; cursor: pointer; }
        .grid-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .chart-box { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; text-align: center; border: 1px solid #eee; }
        th { background: #343a40; color: white; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-weight: bold; display: inline-block; }
        .badge-pass { background: #dcfce7; color: #166534; }
        .badge-fail { background: #fee2e2; color: #991b1b; cursor: pointer; border: 1px solid #f87171; transition: 0.2s; }
        .badge-fail:hover { background: #ff4d4d; color: white; transform: scale(1.05); }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; border-radius: 12px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; position: relative; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: 'Sarabun'; }
        input[readonly] { background: #f1f5f9; color: #64748b; }
        .checklist-container { background: #f8f9fa; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; }
        .check-item { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; font-size: 14px; }
        .check-item input { width: auto; margin-right: 10px; }
        .qgi-hint { font-size: 13px; margin-bottom: 10px; padding: 10px; border-radius: 6px; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { background: #10b981; color: white; border: none; flex: 2; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-close { background: #94a3b8; color: white; border: none; flex: 1; padding: 14px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Multi-Trial Performance Analysis</h1>
        <p>แสดงค่า Sigma Metric รายเดือน พร้อมเส้นแบ่งคุณภาพบน Opspec Chart</p>
    </div>

    <div class="controls">
        <label>เลือกรายการทดสอบ:</label>
        <select id="testSelect" onchange="updateDashboard()"></select>
    </div>

    <div class="grid-charts">
        <div class="chart-box"><div id="opspecChart"></div></div>
        <div class="chart-box"><div id="trendChart"></div></div>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Trial</th>
                    <th>เดือน - ปี</th>
                    <th>TEa (%)</th>
                    <th>%Bias</th>
                    <th>%CV</th>
                    <th>Sigma</th>
                    <th>QGI</th>
                    <th>สถานะการแก้ไข</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="correctionModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0; border-bottom: 2px solid #10b981; padding-bottom: 10px;">🛠️ บันทึกการแก้ไข (EQA Correction)</h2>
        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>รายการ / Trial</label>
                <input type="text" id="modalInfo" readonly>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Sigma เดิม | QGI เดิม</label>
                <input type="text" id="modalStats" readonly>
            </div>
        </div>
        
        <div class="form-group" style="background: #fffbeb; padding: 12px; border: 1px solid #fde68a; border-radius: 8px;">
            <label style="color: #b45309;">📈 ค่า Sigma ใหม่ (หลังดำเนินการแก้ไข / ทำกลุ่มทดลองซ้ำ):</label>
            <input type="number" id="modalFollowUpSigma" step="0.01" placeholder="กรอกค่า Sigma ที่ได้ล่าสุดหลังแก้ไขปัญหา เช่น 4.52" required>
        </div>

        <div id="qgiMessage" class="qgi-hint"></div>
        <div class="form-group">
            <label>🔍 วิเคราะห์สาเหตุ (Root Cause):</label>
            <div id="causeChecklist" class="checklist-container"></div>
            <textarea id="customCause" rows="2" placeholder="ระบุสาเหตุเพิ่มเติม..."></textarea>
        </div>
        <div class="form-group">
            <label>✅ การแก้ไข (Action Plan):</label>
            <div id="actionChecklist" class="checklist-container"></div>
            <textarea id="customAction" rows="2" placeholder="ระบุการแก้ไขเพิ่มเติม..."></textarea>
        </div>
        <div class="form-group">
            <label>ผู้บันทึก:</label>
            <input type="text" id="modalReporter" placeholder="ชื่อผู้รับผิดชอบ">
        </div>
        <div class="btn-group">
            <button onclick="submitCorrection()" id="saveBtn" class="btn-save">💾 บันทึกข้อมูล & ส่งแจ้งเตือน</button>
            <button onclick="closeModal()" class="btn-close">ยกเลิก</button>
        </div>
    </div>
</div>

<script>
const urls = {
    tea: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl5LFgoVYsSVJGDq95K8tr5ZDfjjnVfCpGrGCfhJ7ck939HYD47F4l5TcPDsbNF7Q6PSCPiZJnbyBd/pub?gid=1789978367&single=true&output=csv",
    cv: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl5LFgoVYsSVJGDq95K8tr5ZDfjjnVfCpGrGCfhJ7ck939HYD47F4l5TcPDsbNF7Q6PSCPiZJnbyBd/pub?gid=870055578&single=true&output=csv",
    bias: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl5LFgoVYsSVJGDq95K8tr5ZDfjjnVfCpGrGCfhJ7ck939HYD47F4l5TcPDsbNF7Q6PSCPiZJnbyBd/pub?gid=446342745&single=true&output=csv"
};

const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzA-a1sjsVejv1hqsyK6NUgYsYkkzkpuwKcsVYfGIxt2G68pmece8cmsEJtevcAv4OX/exec';

// ตั้งค่า Telegram Token และ Chat ID
const TELEGRAM_TOKEN = "8682711290:AAFlmIBAZLcGwIUzhzfAVtHmp5F7fcJajMQ";
const TELEGRAM_CHAT_ID = "-1003979978338";

let masterData = { tea: [], bias: [], cv: [] };
let currentData = {};

async function fetchData() {
    const fetchCSV = (url) => new Promise(res => Papa.parse(url, { 
        download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
        complete: (r) => res(r.data) 
    }));
    
    try {
        [masterData.tea, masterData.cv, masterData.bias] = await Promise.all([
            fetchCSV(urls.tea), fetchCSV(urls.cv), fetchCSV(urls.bias)
        ]);
        
        const tests = Object.keys(masterData.tea[0]).filter(k => 
            !['Trial', 'Month - Year', 'month-year', 'Month-Year'].includes(k)
        );
        const select = document.getElementById('testSelect');
        tests.forEach(t => select.add(new Option(t, t)));
        
        updateDashboard();
    } catch (err) {
        console.error("Data Load Error:", err);
    }
}

function updateDashboard() {
    const test = document.getElementById('testSelect').value;
    if (!test) return;

    let tableHTML = "", trials = [], biasArr = [], cvArr = [], opspecData = [];

    masterData.tea.forEach((row, i) => {
        const trial = row.Trial;
        const monthYear = row['Month - Year'] || row['Month-Year'] || "-";
        const tea = row[test];
        
        const biasRow = masterData.bias[i];
        const cvRow = masterData.cv[i];
        const bias = biasRow ? biasRow[test] : null;
        const cv = cvRow ? cvRow[test] : null;

        if (trial && tea != null && bias != null && cv != null && cv !== 0) {
            const sigma = (tea - Math.abs(bias)) / cv;
            const qgi = Math.abs(bias) / (1.5 * cv);
            const pass = sigma >= 4;

            trials.push(trial); 
            biasArr.push(Math.abs(bias)); 
            cvArr.push(cv);
            
            opspecData.push({ 
                x: [(cv/tea)*100], 
                y: [(Math.abs(bias)/tea)*100], 
                mode:'markers+text', 
                name: trial, 
                text: [trial],
                textposition: 'top center',
                hoverinfo: 'name+x+y+text',
                customdata: [monthYear],
                hovertemplate: `<b>Trial: ${trial}</b><br>เดือน: ${monthYear}<br>%CV/TEa: %{x:.2f}%<br>%Bias/TEa: %{y:.2f}%<extra></extra>`,
                marker:{size:12, color: pass ? '#22c55e' : '#ef4444', line: {color: 'white', width: 1}} 
            });

            tableHTML += `<tr>
                <td>${trial}</td>
                <td>${monthYear}</td>
                <td>${tea}</td>
                <td>${Math.abs(bias).toFixed(2)}</td>
                <td>${cv.toFixed(2)}</td>
                <td style="font-weight:bold; color:${pass?'#16a34a':'#dc2626'}">${sigma.toFixed(2)}</td>
                <td>${qgi.toFixed(2)}</td>
                <td>${pass ? '<span class="status-badge badge-pass">PASS</span>' : 
                    `<span class="status-badge badge-fail" onclick="openModal('${test}', '${trial}', ${sigma.toFixed(2)}, ${qgi.toFixed(2)})">FAIL (คลิกแก้ไข)</span>`}</td>
            </tr>`;
        }
    });

    const sigmaLines = [
        {s: 6, label: '6σ (World Class)', color: 'rgba(34, 197, 94, 0.5)'},
        {s: 5, label: '5σ (Excellent)', color: 'rgba(59, 130, 246, 0.5)'},
        {s: 4, label: '4σ (Good)', color: 'rgba(245, 158, 11, 0.5)'},
        {s: 3, label: '3σ (Marginal)', color: 'rgba(239, 68, 68, 0.5)'},
        {s: 2, label: '2σ (Poor)', color: 'rgba(0, 0, 0, 0.3)'}
    ].map(line => ({
        type: 'line',
        x0: 0, y0: 100,
        x1: 100/line.s, y1: 0,
        line: { color: line.color, width: 2, dash: 'dash' }
    }));

    Plotly.newPlot('opspecChart', opspecData, { 
        title: 'Normalized Opspec Chart', 
        xaxis: {title:'%CV / TEa (%)', range: [0, 50]}, 
        yaxis: {title:'%Bias / TEa (%)', range: [0, 100]}, 
        shapes: sigmaLines,
        annotations: [
            {x: 100/6, y: 10, text: '6σ', showarrow: false, font: {color: 'green'}},
            {x: 100/4, y: 10, text: '4σ', showarrow: false, font: {color: 'orange'}},
            {x: 100/3, y: 10, text: '3σ', showarrow: false, font: {color: 'red'}}
        ],
        height: 450, margin: {t: 50}
    });
    
    Plotly.newPlot('trendChart', [
        {x: trials, y: biasArr, name: '%Bias', type: 'scatter', line: {color: '#3b82f6', width: 3}, marker: {size: 8}},
        {x: trials, y: border = cvArr, name: '%CV', type: 'scatter', line: {color: '#f59e0b', width: 3}, marker: {size: 8}}
    ], { 
        title: 'Bias & CV Trend', 
        height: 450, 
        margin: {t: 50},
        xaxis: { title: 'Trial Number' },
        yaxis: { title: 'Percentage (%)' }
    });

    document.getElementById('tableBody').innerHTML = tableHTML;
}

function openModal(test, trial, sigma, qgi) {
    currentData = { test, trial, sigma, qgi };
    document.getElementById('modalInfo').value = test + " | Trial: " + trial;
    document.getElementById('modalStats').value = "Sigma: " + sigma + " | QGI: " + qgi;
    document.getElementById('modalFollowUpSigma').value = ""; // เคลียร์ช่องกรอกข้อมูลเก่าออก
    
    const msg = document.getElementById('qgiMessage');
    let causes = [], actions = [];
    
    if (qgi > 1.2) {
        msg.innerHTML = "⚠️ ปัญหาหลักจาก Inaccuracy (Bias): แนะนำตรวจสอบระบบ Calibration & Systematic Error";
        msg.style.background = "#fff7ed"; 
        msg.style.color = "#c2410c";
        
        causes = [
            "Calibrator เสื่อมสภาพ / ละลายทิ้งไว้นานเกินไป",
            "Calibration Curve หมดอายุ หรือเสื่อมสภาพ",
            "คีย์ค่า Assigned Value หรือ Lot Number ของ Calibrator ผิดพลาด",
            "มีการเปลี่ยน Lot น้ำยา (Reagent Lot Change) โดยไม่ได้ Calibrate ใหม่",
            "หลอดไฟ (Lamp) หรือฟิลเตอร์วัดแสงเสื่อมสภาพ (Systematic Shift)",
            "การตั้งค่าอุณหภูมิของเครื่องวิเคราะห์คลาดเคลื่อนจากค่ามาตรฐาน"
        ];
        
        actions = [
            "ทำการ Re-Calibration ใหม่ด้วยน้ำยาปัจจุบัน",
            "เปิดใช้ Calibrator ขวดใหม่/ล็อตใหม่ในการทำ Calibration",
            "ตรวจสอบและแก้ไขค่า Assigned Value ในโปรแกรมให้ตรงกับเอกสารใบ Lot",
            "ตรวจสอบประวัติการเปลี่ยนล็อตน้ำยา และทดสอบซ้ำ",
            "ตรวจสอบพลังงานหลอดไฟ (Lamp photometer check)",
            "ตรวจสอบและบันทึกอุณหภูมิของ Incubation bath/block"
        ];
        
    } else if (qgi < 0.8) {
        msg.innerHTML = "⚠️ ปัญหาหลักจาก Imprecision (CV): แนะนำตรวจสอบระบบเครื่อง & Random Error";
        msg.style.background = "#eff6ff"; 
        msg.style.color = "#1d4ed8";
        
        causes = [
            "มีฟองอากาศ (Air Bubbles/Microbubbles) ในระบบท่อหรือ Probe",
            "Sample/Reagent Probe สกปรก, อุดตันบางส่วน หรือมีคราบเกาะ (Clog/Fibrin)",
            "สารควบคุมคุณภาพ (QC) เสื่อมสภาพ / เทคนิคการละลาย (Reconstitution) แกว่ง",
            "อุณหภูมิปฏิกิริยา (Incubation Bath) ไม่คงที่ แกว่งไปมาขณะเครื่องทำงาน",
            "เกิดรอยขีดข่วนหรือความสกปรกที่หลอดปฏิกิริยา (Cuvette)",
            "ความแปรปรวนจากเทคนิคของผู้ปฏิบัติงาน (Operator Variation เช่น การปิเปตด้วยมือ)"
        ];
        
        actions = [
            "ทำ Air Purge / Prime Reagent เพื่อไล่ฟองอากาศในระบบท่อ",
            "ทำ Maintenance ล้างสารขจัดคราบโปรตีนที่ Probe (Probe Cleaning)",
            "เปิดใช้ QC หลอดใหม่ (Freshly reconstituted/Aliquoted QC)",
            "ตรวจสอบความเสถียรของระบบความร้อนเครื่อง (Temperature stability test)",
            "ทำความสะอาด Cuvette หรือสั่งรัน Cell Blank / เปลี่ยน Cuvette ชุดใหม่",
            "ทบทวน Standard Operating Procedure (SOP) และควบคุมเทคนิคการเตรียมสาร"
        ];
        
    } else {
        msg.innerHTML = "⚠️ ปัญหาผสม (Mixed): แนะนำตรวจสอบทั้งระบบน้ำยา เทคนิค และตัวเครื่องร่วมกัน";
        msg.style.background = "#fef2f2"; 
        msg.style.color = "#b91c1c";
        
        causes = [
            "น้ำยา (Reagent) ใกล้หมดอายุ เสื่อมสภาพ หรือเหลือก้นขวดน้อยเกินไป",
            "สาร QC เริ่มเสื่อมสภาพจากการเก็บรักษาไม่เหมาะสม (เช่น อุณหภูมิตู้เย็นแกว่ง)",
            "ความคลาดเคลื่อนสะสมจากทั้งเทคนิคการเตรียมและระบบกลไกของเครื่อง",
            "มีการบำรุงรักษาเครื่องใหญ่ (Major Maintenance) ที่ส่งผลต่อทั้งความเที่ยงและความแม่น"
        ];
        
        actions = [
            "ตรวจสอบวันหมดอายุ สภาพน้ำยา และปริมาณน้ำยาที่เหลือในเครื่อง (On-board stability)",
            "ตรวจสอบอุณหภูมิของตู้เย็นที่ใช้เก็บรักษาน้ำยาและสาร QC",
            "ทำการ Re-Calibration ควบคู่ไปกับการทำ Maintenance ระบบดูดจ่าย",
            "ทบทวนขั้นตอน SOP ร่วมกับเจ้าหน้าที่ในทีมเพื่อลดความแปรปรวน"
        ];
    }
    
    document.getElementById('causeChecklist').innerHTML = causes.map(c => 
        `<label class="check-item"><input type="checkbox" name="c" value="${c}"> ${c}</label>`
    ).join('');
    
    document.getElementById('actionChecklist').innerHTML = actions.map(a => 
        `<label class="check-item"><input type="checkbox" name="a" value="${a}"> ${a}</label>`
    ).join('');
    
    document.getElementById('correctionModal').style.display = 'block';
}

function closeModal() { document.getElementById('correctionModal').style.display = 'none'; }

// ฟังก์ชันส่งรายงานการติดตามเข้าไปยังกลุ่ม Telegram
async function sendTelegramAlert(data) {
    // ตรวจสอบเงื่อนไขว่าผ่านเกณฑ์ชี้วัดไหม
    const isPass = data.followUpSigma >= 4;
    const statusEmoji = isPass ? "✅ แก้ไขสำเร็จ (ผ่านเกณฑ์)" : "❌ แก้ไขแล้วแต่ยังไม่ผ่านเกณฑ์";
    const statusText = isPass ? "PASS (Sigma ≥ 4.0)" : "FAIL (Sigma < 4.0)";

    const message = `
🔔 *[EQA Action Follow-up Report]*
━━━━━━━━━━━━━━━━━━
📊 *รายการทดสอบ:* ${data.testName}
🌀 *Trial:* ${data.trialId}
👤 *ผู้รายงาน:* ${data.reporter}

📉 *ผลลัพธ์เดิม:*
- Sigma เดิม: ${data.sigmaValue}

📈 *ผลลัพธ์หลังแก้ไข ปรับปรุง:*
- *Sigma ใหม่:* ${data.followUpSigma}
- *สถานะประเมิน:* ${statusEmoji} (${statusText})

🔍 *สาเหตุ (Root Cause):*
${data.rootCause}

✅ *การปฏิบัติงานแก้ไข (Action Plan):*
${data.actionPlan}
━━━━━━━━━━━━━━━━━━
`.trim();

    const telegramUrl = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
    
    try {
        await fetch(telegramUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })
        });
        console.log("ส่ง Telegram สำเร็จ");
    } catch (err) {
        console.error("ผิดพลาดขณะส่งไลน์เข้า Telegram:", err);
    }
}

async function submitCorrection() {
    const btn = document.getElementById('saveBtn');
    const followUpSigmaInput = document.getElementById('modalFollowUpSigma').value;
    
    // ตรวจสอบข้อมูลบังคับให้กรอกช่อง Sigma ใหม่ด้วย
    if (!followUpSigmaInput) return alert("กรุณาระบุค่า Sigma หลังการแก้ไขเพื่อติดตามผล");
    
    const followUpSigma = parseFloat(followUpSigmaInput);
    const c = Array.from(document.querySelectorAll('input[name="c"]:checked')).map(e => e.value);
    const a = Array.from(document.querySelectorAll('input[name="a"]:checked')).map(e => e.value);
    
    const data = {
        trialId: currentData.trial,
        testName: currentData.test,
        sigmaValue: currentData.sigma,
        followUpSigma: followUpSigma, // ฟิลด์เก็บข้อมูลใหม่ที่เพิ่มขึ้นมา
        rootCause: [...c, document.getElementById('customCause').value].filter(v => v).join(", "),
        actionPlan: [...a, document.getElementById('customAction').value].filter(v => v).join(", "),
        reporter: document.getElementById('modalReporter').value
    };
    
    if (!data.rootCause || !data.actionPlan || !data.reporter) return alert("กรุณาระบุสาเหตุ การแก้ไข และชื่อผู้บันทึก");
    
    btn.innerText = "กำลังบันทึกและส่งข้อมูล..."; btn.disabled = true;
    
    try {
        // 1. บันทึกเข้า Google Sheet Web App (ส่งแบบ No-Cors)
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        
        // 2. ส่งแจ้งเตือนรายงานสถานะเข้ากลุ่ม Telegram
        await sendTelegramAlert(data);
        
        alert("บันทึกข้อมูลและแจ้งเตือนผ่าน Telegram สำเร็จแล้ว!"); 
        closeModal();
    } catch (e) { 
        alert("เกิดข้อผิดพลาดในการบันทึกหรือส่งข้อมูล"); 
    } finally { 
        btn.innerText = "💾 บันทึกข้อมูล & ส่งแจ้งเตือน"; btn.disabled = false; 
    }
}

fetchData();
</script>
</body>
</html>
