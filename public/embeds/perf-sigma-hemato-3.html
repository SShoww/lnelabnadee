<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart CBC EQA Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; margin: 20px; background-color: #f4f7f9; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .controls { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; align-items: center; gap: 20px; justify-content: center; }
        select { padding: 10px 20px; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; min-width: 250px; cursor: pointer; }
        .grid-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .chart-box { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px; text-align: center; border: 1px solid #eee; }
        th { background: #343a40; color: white; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-weight: bold; display: inline-block; }
        .badge-pass { background: #dcfce7; color: #166534; }
        .badge-fail { background: #fee2e2; color: #991b1b; cursor: pointer; border: 1px solid #f87171; transition: 0.2s; }
        .badge-fail:hover { background: #ff4d4d; color: white; transform: scale(1.05); }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; border-radius: 12px; width: 90%; max-width: 750px; max-height: 90vh; overflow-y: auto; position: relative; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: 'Sarabun'; }
        .checklist-container { background: #f8f9fa; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; }
        .check-item { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; font-size: 14px; }
        .check-item input { width: auto; margin-right: 10px; }
        .qgi-hint { font-size: 13px; margin-bottom: 10px; padding: 10px; border-radius: 6px; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { background: #10b981; color: white; border: none; flex: 2; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-close { background: #94a3b8; color: white; border: none; flex: 1; padding: 14px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Hematology Performance Analysis (CBC)</h1>
        <p>เชื่อมโยงข้อมูลจริง | วิเคราะห์อัตโนมัติเฉพาะ Trial ที่มีข้อมูลครบ</p>
    </div>

    <div class="controls">
        <label>เลือกรายการทดสอบ (Parameter):</label>
        <select id="testSelect" onchange="updateDashboard()"></select>
    </div>

    <div class="grid-charts">
        <div class="chart-box"><div id="opspecChart"></div></div>
        <div class="chart-box"><div id="trendChart"></div></div>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Trial</th>
                    <th>TEa (%)</th>
                    <th>%Bias</th>
                    <th>%CV</th>
                    <th>Sigma</th>
                    <th>QGI</th>
                    <th>สถานะ / การบันทึกแก้ไข</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="correctionModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0; border-bottom: 2px solid #10b981; padding-bottom: 10px;">🛠️ บันทึกการแก้ไข (Hematology EQA)</h2>
        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>พารามิเตอร์ | Trial</label>
                <input type="text" id="modalInfo" readonly>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Sigma | QGI</label>
                <input type="text" id="modalStats" readonly>
            </div>
        </div>
        <div id="qgiMessage" class="qgi-hint"></div>
        <div class="form-group">
            <label>🔍 วิเคราะห์สาเหตุ (Root Cause):</label>
            <div id="causeChecklist" class="checklist-container"></div>
            <textarea id="customCause" rows="2" placeholder="ระบุสาเหตุอื่นๆ..."></textarea>
        </div>
        <div class="form-group">
            <label>✅ การปฏิบัติการแก้ไข (Action Plan):</label>
            <div id="actionChecklist" class="checklist-container"></div>
            <textarea id="customAction" rows="2" placeholder="ระบุการแก้ไขอื่นๆ..."></textarea>
        </div>
        <div class="form-group">
            <label>ผู้บันทึก:</label>
            <input type="text" id="modalReporter" placeholder="ระบุชื่อเจ้าหน้าที่">
        </div>
        <div class="btn-group">
            <button onclick="submitCorrection()" id="saveBtn" class="btn-save">💾 บันทึกไปยัง Google Sheet</button>
            <button onclick="closeModal()" class="btn-close">ยกเลิก</button>
        </div>
    </div>
</div>

<script>
// --- อัปเดต URL ตามที่คุณให้มา ---
const urls = {
    tea: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTY5oIAAuokBMbsG02BfhUGQZyDfa8bfeEL92fTmLTNHS6ubeQuHuGpTHpmfBl3MOm3vr-44uNYZtf/pub?gid=1948460832&single=true&output=csv",
    bias: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTY5oIAAuokBMbsG02BfhUGQZyDfa8bfeEL92fTmLTNHS6ubeQuHuGpTHpmfBl3MOm3vr-44uNYZtf/pub?gid=1394044833&single=true&output=csv",
    cv: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTY5oIAAuokBMbsG02BfhUGQZyDfa8bfeEL92fTmLTNHS6ubeQuHuGpTHpmfBl3MOm3vr-44uNYZtf/pub?gid=500696314&single=true&output=csv"
};

const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzf4SzEhUP9TqFSFPdjb_pYhy1x4OAx8ryWnnWYcusreEDPH6yaOzuWius47HUw2aFIZA/exec';

let masterData = { tea: [], bias: [], cv: [] };

async function fetchData() {
    const fetchCSV = (url) => new Promise(res => Papa.parse(url, { download: true, header: true, dynamicTyping: true, skipEmptyLines: true, complete: (r) => res(r.data) }));
    try {
        [masterData.tea, masterData.bias, masterData.cv] = await Promise.all([fetchCSV(urls.tea), fetchCSV(urls.bias), fetchCSV(urls.cv)]);
        
        // ดึงชื่อหัวคอลัมน์ (Test Names) ยกเว้น 'Trial'
        const tests = Object.keys(masterData.tea[0]).filter(k => k.toLowerCase() !== 'trial');
        const select = document.getElementById('testSelect');
        select.innerHTML = "";
        tests.forEach(t => select.add(new Option(t, t)));
        
        updateDashboard();
    } catch (e) {
        alert("ไม่สามารถโหลดข้อมูลได้ กรุณาตรวจสอบการ Publish CSV");
    }
}

function updateDashboard() {
    const test = document.getElementById('testSelect').value;
    let tableHTML = "", trials = [], biasArr = [], cvArr = [], opspec = [];

    // วนลูปตามจำนวนแถวของ TEa
    masterData.tea.forEach((row, i) => {
        const trial = row.Trial;
        const tea = row[test];
        const bias = (masterData.bias[i] && masterData.bias[i][test] !== null) ? masterData.bias[i][test] : undefined;
        const cv = (masterData.cv[i] && masterData.cv[i][test] !== null) ? masterData.cv[i][test] : undefined;

        // --- จุดสำคัญ: ตรวจสอบว่ามีข้อมูลครบหรือไม่ ถ้าไม่ครบให้ข้าม (Skip) ---
        if (trial != null && tea != null && bias !== undefined && cv !== undefined && cv !== 0) {
            
            const sigma = (tea - Math.abs(bias)) / cv;
            const qgi = Math.abs(bias) / (1.5 * cv);
            const pass = sigma >= 4;

            trials.push("T" + trial); 
            biasArr.push(Math.abs(bias)); 
            cvArr.push(cv);
            
            opspec.push({ 
                x: [(cv/tea)*100], 
                y: [(Math.abs(bias)/tea)*100], 
                mode:'markers+text', 
                text: ['T'+trial],
                textposition: 'top center',
                name:'Trial '+trial, 
                marker:{size:12, color: pass?'#22c55e':'#ef4444'} 
            });

            tableHTML += `<tr>
                <td>${trial}</td>
                <td>${tea}</td>
                <td>${bias.toFixed(2)}</td>
                <td>${cv.toFixed(2)}</td>
                <td style="font-weight:bold; color:${pass?'#166534':'#991b1b'}">${sigma.toFixed(2)}</td>
                <td>${qgi.toFixed(2)}</td>
                <td>${pass ? '<span class="status-badge badge-pass">PASS</span>' : 
                    `<span class="status-badge badge-fail" onclick="openModal('${test}', '${trial}', ${sigma.toFixed(2)}, ${qgi.toFixed(2)})">FAIL (คลิกบันทึกแก้ไข)</span>`}</td>
            </tr>`;
        }
    });

    // วาดกราฟ
    Plotly.newPlot('opspecChart', opspec, { 
        title: 'Normalized Opspec Chart', 
        xaxis: {title:'%CV / TEa', range:[0, 60]}, 
        yaxis: {title:'%Bias / TEa', range:[0, 110]},
        height: 400 
    });

    Plotly.newPlot('trendChart', [
        {x: trials, y: biasArr, name: '%Bias (Inaccuracy)', type: 'scatter', line: {color: '#f97316'}},
        {x: trials, y: cvArr, name: '%CV (Imprecision)', type: 'scatter', line: {color: '#3b82f6'}}
    ], { title: 'Trend Analysis: Bias & CV', height: 400 });

    document.getElementById('tableBody').innerHTML = tableHTML;
}

// ฟังก์ชันอื่นๆ (openModal, submitCorrection) ยังคงเดิมจากโค้ดที่คุณให้มา
function openModal(test, trial, sigma, qgi) {
    currentData = { test, trial, sigma, qgi };
    document.getElementById('modalInfo').value = test + " | Trial: " + trial;
    document.getElementById('modalStats').value = "Sigma: " + sigma + " | QGI: " + qgi;
    
    const msg = document.getElementById('qgiMessage');
    let causes = [], actions = [];

    if (qgi > 1.2) {
        msg.innerHTML = "⚠️ ปัญหาจาก Inaccuracy (Bias)";
        msg.style.background = "#fff7ed"; msg.style.color = "#c2410c";
        causes = ["Calibrator value error", "Reagent Lot changed", "Protein buildup", "Control deteriorated"];
        actions = ["Re-Calibration", "Heavy Clean", "New Reagent/Control", "Check Storage"];
    } else if (qgi < 0.8) {
        msg.innerHTML = "⚠️ ปัญหาจาก Imprecision (CV)";
        msg.style.background = "#eff6ff"; msg.style.color = "#1d4ed8";
        causes = ["Micro-bubbles", "Probe/Wiper dirty", "Inadequate mixing", "Temp fluctuation"];
        actions = ["Air Purge", "Clean Probe/Wiper", "Change Probe", "Check Mixer"];
    } else {
        msg.innerHTML = "⚠️ ปัญหาผสม (Bias & CV)";
        msg.style.background = "#fef2f2"; msg.style.color = "#b91c1c";
        causes = ["Partial Clog", "EQA Preparation error", "Tubing leak", "Vacuum/Pressure error"];
        actions = ["Aperture Burn", "Check Tubing", "Review SOP", "Technical Service"];
    }

    document.getElementById('causeChecklist').innerHTML = causes.map(c => `<label class="check-item"><input type="checkbox" name="c" value="${c}"> ${c}</label>`).join('');
    document.getElementById('actionChecklist').innerHTML = actions.map(a => `<label class="check-item"><input type="checkbox" name="a" value="${a}"> ${a}</label>`).join('');
    
    document.getElementById('correctionModal').style.display = 'block';
}

function closeModal() { document.getElementById('correctionModal').style.display = 'none'; }

async function submitCorrection() {
    const btn = document.getElementById('saveBtn');
    const checkedCauses = Array.from(document.querySelectorAll('input[name="c"]:checked')).map(e => e.value);
    const checkedActions = Array.from(document.querySelectorAll('input[name="a"]:checked')).map(e => e.value);
    const rootCause = [...checkedCauses, document.getElementById('customCause').value].filter(v => v).join(", ");
    const actionPlan = [...checkedActions, document.getElementById('customAction').value].filter(v => v).join(", ");
    const reporter = document.getElementById('modalReporter').value;

    if (!rootCause || !actionPlan || !reporter) return alert("กรุณากรอกข้อมูลให้ครบ");

    btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
    try {
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({
            trialId: currentData.trial, testName: currentData.test, sigmaValue: currentData.sigma,
            rootCause, actionPlan, reporter
        })});
        alert("บันทึกข้อมูลสำเร็จ!");
        closeModal();
    } catch (e) {
        alert("เกิดข้อผิดพลาด");
    } finally {
        btn.innerText = "💾 บันทึกไปยัง Google Sheet"; btn.disabled = false;
    }
}

fetchData();
</script>
</body>
</html>
