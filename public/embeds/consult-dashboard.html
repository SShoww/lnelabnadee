<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultation Dashboard - Full View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Sarabun', sans-serif; }
        .dashboard-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .table-container { max-height: 70vh; overflow-y: auto; border-radius: 10px; }
        .clickable-row { cursor: pointer; transition: background 0.2s; }
        .clickable-row:hover { background-color: #e9ecef !important; }
        .modal-header { background-color: #0d6efd; color: white; }
        .detail-label { font-weight: bold; color: #555; width: 150px; display: inline-block; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="dashboard-card">
        <h2 class="mb-4 text-center">📋 บันทึกการให้คำปรึกษา</h2>
        
        <div class="row g-3 mb-4 justify-content-between align-items-end">
            <div class="col-md-4">
                <label class="form-label fw-bold">📅 เลือกช่วงเดือน/ปี:</label>
                <select id="monthFilter" class="form-select form-select-lg">
                    <option value="all">แสดงทั้งหมด</option>
                </select>
            </div>
            <div class="col-md-4 text-end text-muted">
                <small>* คลิกที่แถวเพื่อดูรายละเอียดฉบับเต็ม</small>
            </div>
        </div>

        <div class="table-container border">
            <table class="table table-hover mb-0">
                <thead class="table-light sticky-top">
                    <tr>
                        <th>วัน-เวลา</th>
                        <th>ผู้ให้คำปรึกษา</th>
                        <th>เรื่อง</th>
                        <th>ผู้รับคำปรึกษา</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">📄 รายละเอียดการให้คำปรึกษา</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modalBody">
                </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSGrmQP9gZ70gx4pvWWzONjnLc0qyALcYrScMyRI4odsxSQ8baB1jsIGZldp6tyxcoCNGcYWLCahwak/pub?gid=1220998183&single=true&output=csv';
    let rawData = [];
    const detailModal = new bootstrap.Modal(document.getElementById('detailModal'));

    async function fetchData() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                rawData = results.data.filter(row => row['ประทับเวลา']);
                setupFilters(rawData);
                renderTable(rawData);
            }
        });
    }

    function setupFilters(data) {
        const filterSelect = document.getElementById('monthFilter');
        const months = new Set();
        data.forEach(row => {
            const dateParts = row['ประทับเวลา'].split(',')[0].split('/');
            if (dateParts.length === 3) months.add(`${dateParts[1]}/${dateParts[2]}`);
        });
        Array.from(months).sort().forEach(my => {
            const option = document.createElement('option');
            option.value = my; option.textContent = my;
            filterSelect.appendChild(option);
        });
    }

    function renderTable(data) {
        const tableBody = document.getElementById('dataTableBody');
        tableBody.innerHTML = '';

        data.forEach((row, index) => {
            const tr = document.createElement('tr');
            tr.className = 'clickable-row';
            tr.innerHTML = `
                <td>${row['ประทับเวลา'] || ''}</td>
                <td>${row['ผู้ให้คำปรึกษา'] || ''}</td>
                <td>${row['เรื่องที่ปรึกษา'] || ''}</td>
                <td>${row['ผู้ปรึกษา'] || ''}</td>
            `;
            tr.onclick = () => showDetail(row);
            tableBody.appendChild(tr);
        });
    }

    function showDetail(item) {
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `
            <div class="mb-3"><span class="detail-label">🕒 วัน-เวลา:</span> ${item['ประทับเวลา']}</div>
            <div class="mb-3"><span class="detail-label">👨‍🏫 ผู้ให้คำปรึกษา:</span> ${item['ผู้ให้คำปรึกษา']}</div>
            <div class="mb-3"><span class="detail-label">👤 ผู้รับคำปรึกษา:</span> ${item['ผู้ปรึกษา']}</div>
            <div class="mb-3"><span class="detail-label">📌 เรื่องที่ปรึกษา:</span> <br><div class="p-2 bg-light mt-1 border-start border-primary border-4">${item['เรื่องที่ปรึกษา']}</div></div>
            <div class="mb-3"><span class="detail-label">📝 รายละเอียด:</span> <br><div class="p-2 bg-light mt-1 border-start border-success border-4" style="white-space: pre-wrap;">${item['รายละเอียดการปรึกษา']}</div></div>
        `;
        detailModal.show();
    }

    document.getElementById('monthFilter').addEventListener('change', function(e) {
        const selected = e.target.value;
        const filtered = selected === 'all' ? rawData : rawData.filter(row => {
            const parts = row['ประทับเวลา'].split(',')[0].split('/');
            return `${parts[1]}/${parts[2]}` === selected;
        });
        renderTable(filtered);
    });

    fetchData();
</script>

</body>
</html>
